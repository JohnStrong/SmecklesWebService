play.modules.enabled += "Module"

######################
# DB configurations
# TODO: create production config later with PostgreSQL over H2
######################
play.evolutions.db.default.autoApply = true

slick.dbs.default {
    profile = "slick.jdbc.H2Profile$"
    db {
      driver = "org.h2.Driver"
      # MODE=PostgreSQL setting ensures evolutions & CRUDs are compat with production postgres;
      # DATABASE_TO_LOWER=true forces h2 to use lower-case table names, which is aligned with postgres table names
      url = "jdbc:h2:mem:shoppinglist;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=true"
      user = "sa"
      password = ""

      # Connection pool (HikariCP)
      numThreads = 5
      maxConnections = 5
      minConnections = 2
      connectionTimeout = 5000    # 5s — fail fast if pool exhausted
      idleTimeout = 300000        # 5min — reclaim idle connections
      maxLifetime = 600000        # 10min — rotate connections
    }
}

