####################
# DEV / TEST ACCOUNT CONFIG
####################

play.modules.enabled += "Module"

#################
# App Hosting
#################
auth.firebase.projectId = "smeckles-app-11ca3"

# App secret — Play uses this to sign session cookies and CSRF tokens.
# Play refuses to start in production mode without a real (non-default) value.
# "changeme" is fine for local dev (dev mode skips the check).
play.http.secret.key = "changeme"
play.http.secret.key = ${?APPLICATION_SECRET}

# Host header filter — rejects requests not targeting these hosts
play.filters.hosts.allowed = ["localhost", ".run.app"]

# CORS — allows the frontend (different origin) to call the API.
# Without this, the browser blocks your frontend from making fetch() calls to the API
# because they're on different domains.
play.filters.enabled += "play.filters.cors.CORSFilter"
# CSRF — disabled because this is a stateless API with Bearer token auth (no cookies/sessions).
play.filters.disabled += "play.filters.csrf.CSRFFilter"

# Firebase Hosting URL for project "smeckles-app-11ca3" will be:
#   https://smeckles-app-11ca3.web.app       (primary)
#   https://smeckles-app-11ca3.firebaseapp.com (legacy alias — also works)
play.filters.cors {
  allowedOrigins = [
    "http://localhost:3000",                         # local frontend dev server
    "https://smeckles-app-11ca3.web.app",           # Firebase Hosting (primary)
    "https://smeckles-app-11ca3.firebaseapp.com"    # Firebase Hosting (legacy alias)
  ]
  allowedHttpMethods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allowedHttpHeaders = ["Authorization", "Content-Type"]
}

######################
# DB configurations (dev/test)
######################
play.evolutions.db.default.autoApply = true

slick.dbs.default {
    profile = "slick.jdbc.H2Profile$"
    db {
      driver = "org.h2.Driver"
      # MODE=PostgreSQL setting ensures evolutions & CRUDs are compat with production postgres;
      # DATABASE_TO_LOWER=true forces h2 to use lower-case table names, which is aligned with postgres table names
      url = "jdbc:h2:mem:shoppinglist;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=true"
      user = "sa"
      password = ""

      # Connection pool (HikariCP)
      numThreads = 5
      maxConnections = 5
      minConnections = 2
      connectionTimeout = 5000    # 5s — fail fast if pool exhausted
      idleTimeout = 300000        # 5min — reclaim idle connections
      maxLifetime = 600000        # 10min — rotate connections
    }
}
